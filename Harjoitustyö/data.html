<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Data</title>
</head>
<body>
    <div class="sidebar">
        <h2>Navigation</h2>
        <hr>
        <ul>
            <li><a href="Index.html">Homepage</a></li>
            <li><a href="data.html">Data</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
        <hr>
        <p>Clicks:</p>
    </div>
    <div class="header">
    <h1>Data</h1>
    </div>
    <div class="content">
        <div class="weather-container">
            <div class="weather-data">
                <h1>Weather data</h1>
                <input type="text" id="city-input" placeholder="Enter city name" value="Oulu"><br>
                <button id="city-input-btn">Get Weather</button>
                <h2 id="city-name">City name</h2>
                <p id="date">Date</p>
                <img id="weather-icon" src="" alt="Weather icon">
                <p id="temperature">Temperature</p>
                <p id="description">description</p>
                <p id="wind-speed">Wind speed</p>
            </div>
        </div>
        <p style="border:none;font-style:italic;text-align: center;">This page uses OpenWeatherMap API to get weather data</p>
    </div>
    
    <script>
        const url = 'https://api.openweathermap.org/data/2.5/weather';
        const apiKey = 'f00c38e0279b7bc85480c3fe775d518c';
        document.getElementById("city-input-btn").addEventListener("click", readCityInput);

        $(document).ready(function () {
	        weatherFn('Oulu'); 
        });

        function readCityInput() {
            const cityName = document.getElementById("city-input").value;
            console.log("City input: " + cityName);
            weatherFn(cityName);
        }

        async function weatherFn(cName) {
            const temp = `${url}?q=${cName}&appid=${apiKey}&units=metric`;
            console.log("Temp url: " + temp);
            try {
                const res = await fetch(temp);
                const data = await res.json();
            if (res.ok) {
                weatherShow(data);
            } else {
                alert("City not found. Please try another city");
            }

            } catch (error) {
                console.log("Error fetching weather data: " + error);
                console.error("Error fetchin weather data.", error);
            }
        }

        function weatherShow(data) {
            console.log("Weather data: ", data);
            document.getElementById("city-name").textContent = "Location: " + data.name;
            document.getElementById("date").textContent = "Date: " + new Date().toLocaleString();
            document.getElementById("weather-icon").src = `https://openweathermap.org/img/wn/${data.weather[0].icon}.png`;
            document.getElementById("temperature").innerHTML = `Temperature: ${data.main.temp} °C`;
            document.getElementById("description").textContent = `Weather description: ${data.weather[0].description}`;
            document.getElementById("wind-speed").textContent = `Wind speed: ${data.wind.speed} m/s`;
        }
    </script>

    <script>
        readCityInput(); // Call the function to fetch weather data for the default city on page load
    </script>
    </div>
</body>
</html>
